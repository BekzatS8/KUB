version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.prod
    environment:
      GIN_MODE: ${GIN_MODE:-release}
      CONFIG_PATH: ${CONFIG_PATH:-/opt/turcompany/config/config.yaml}
      DATABASE_URL: postgres://${POSTGRES_USER:-turcompany}:${POSTGRES_PASSWORD:-turcompany}@postgres:5432/${POSTGRES_DB:-turcompany}?sslmode=disable
      DB_WAIT_RETRIES: ${DB_WAIT_RETRIES:-30}
      DB_WAIT_INTERVAL: ${DB_WAIT_INTERVAL:-2}
      TELEGRAM_APITOKEN: ${TELEGRAM_APITOKEN:-}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./config/config.yaml:/opt/turcompany/config/config.yaml:ro
      - ./files:/opt/turcompany/files
    ports:
      - "${API_PORT:-4000}:4000"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:4000/healthz >/dev/null 2>&1 || exit 1" ]
      interval: 1200s
      timeout: 3s
      retries: 5
    restart: unless-stopped
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-turcompany}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-turcompany}
      POSTGRES_DB: ${POSTGRES_DB:-turcompany}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-turcompany} -d ${POSTGRES_DB:-turcompany}"]
      interval: 50s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    profiles: ["redis"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  migrate:
    image: postgres:15
    env_file:
      - .env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-turcompany}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-turcompany}
      POSTGRES_DB: ${POSTGRES_DB:-turcompany}
    volumes:
      - ./db/migrations:/migrations:ro
      - ./scripts/run-migrations.sh:/run-migrations.sh:ro
    command: ["sh","-lc","tr -d '\\r' < /run-migrations.sh | sh -eu"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  nginx:
    image: nginx:1.27-alpine
    profiles: ["nginx"]
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    restart: unless-stopped

volumes:
  postgres-data:
