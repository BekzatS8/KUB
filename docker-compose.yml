version: "3.9"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: turcompany
      POSTGRES_PASSWORD: turcompany
      POSTGRES_DB: turcompany
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turcompany -d turcompany"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      GIN_MODE: release
      DATABASE_URL: postgres://turcompany:turcompany@db:5432/turcompany?sslmode=disable
    volumes:
      - ./config:/opt/turcompany/config:ro
      - ./assets:/opt/turcompany/assets:ro
      - ./files:/opt/turcompany/files
    ports:
      - "4000:4000"
    restart: unless-stopped

volumes:
  db-data:
