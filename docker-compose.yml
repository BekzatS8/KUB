version: "3.9"
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: turcompany
      POSTGRES_PASSWORD: turcompany
      POSTGRES_DB: turcompany
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turcompany -d turcompany"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: postgres:15
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: turcompany
      POSTGRES_PASSWORD: turcompany
      POSTGRES_DB: turcompany
    volumes:
      - ./db/migrations:/migrations:ro
      - ./scripts/run-migrations.sh:/run-migrations.sh:ro
    command: ["sh", "/run-migrations.sh"]
    restart: "no"

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      GIN_MODE: release
      DATABASE_URL: postgres://turcompany:turcompany@postgres:5432/turcompany?sslmode=disable
    volumes:
      - ./config:/opt/turcompany/config:ro
      - ./assets:/opt/turcompany/assets:ro
      - ./files:/opt/turcompany/files
    ports:
      - "4000:4000"
    restart: unless-stopped

volumes:
  db-data:
