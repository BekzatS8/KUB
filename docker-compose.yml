version: "3.9"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: turcompany
      POSTGRES_PASSWORD: turcompany
      POSTGRES_DB: turcompany
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    depends_on:
      - db
    environment:
      GIN_MODE: release
    volumes:
      - ./config:/opt/turcompany/config:ro
      - ./assets:/opt/turcompany/assets:ro
      - ./files:/opt/turcompany/files
    ports:
      - "4000:4000"
    restart: unless-stopped

volumes:
  db-data:
